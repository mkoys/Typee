<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@48,400,1,0" />
    <link rel="stylesheet" href="style.css">
    <script src="main.js" type="module" defer></script>
    <title>Typee</title>
</head>
<body>
    <div class="popupBox">
        <div class="popup">
            <div class="search">
                <span class="material-symbols-outlined searchIcon">search</span>
                <input type="text" class="searchInput" placeholder="Type to search" />
            </div>
            <div class="languageMenu">
            </div>
            <div class="prefrenceMenu">
                <div class="prefrenceOption prefrenceLanguage">
                    <span class="material-symbols-outlined prefrenceOptionIcon">translate</span>
                    <p class="prefrenceOptionText">Language</p>
                </div>
            </div>
        </div>
    </div>
    <header>
        <div class="logo">
            <span class="material-symbols-outlined icon">assistant</span>
            <p class="heading">Typee</p>
        </div>
    </header>
    <div class="box">
        <div class="container">
            <div class="info">
                <p class="counter"></p>
                <div class="filler"></div>
                <div class="language">
                    <span class="material-symbols-outlined languageIcon">public</span>
                    <p class="languageText"></p>
                </div>
                <p class="speed"></p>
            </div>
        </div>
        <div class="container">
            <div class="view">
            </div>
        </div>
    </div>
</body>
</html>
